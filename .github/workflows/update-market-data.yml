name: Update Market Data and Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 1-5"
    - cron: "30 9 * * 1-5" # Taiwan time 17:30

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.market_data.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check, update, and validate market data
        id: market_data
        run: npm run update:data

      - name: Build
        if: steps.market_data.outputs.changed == 'true'
        run: npm run build

      - name: Validate built data
        if: steps.market_data.outputs.changed == 'true'
        run: npm run validate:data -- --data-dir dist/data --previous-dir .market-data-work/previous

      - name: Configure Pages
        if: steps.market_data.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.market_data.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: needs.update-build.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
